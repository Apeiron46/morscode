    <meta charset="UTF-8">

    <title>Morse Master - Mobile Optimized</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            margin: 0;
            height: 100vh;
            overflow-x: hidden;
            align-items: center;
        }

        /* DİL BUTONU - MOBİLDE DAHA ERİŞİLEBİLİR */
        #lang-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: #222;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        /* GÖREV ALANI - MERKEZİ VE NET */
        #task-area {
            margin-top: 60px;
            width: 90%;
            max-width: 400px;
            background: #222;
            border: 2px dashed #00ff00;
            padding: 15px 10px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        #target-word { font-size: 1.8rem; letter-spacing: 3px; color: #fff; text-transform: uppercase; margin: 5px 0; }
        #task-status { font-size: 0.8rem; color: #888; }

        /* ANA ÇALIŞMA ALANI */
        #main-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: calc(100vh - 150px);
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            gap: 15px;
        }

        /* REHBER - MASAÜSTÜNDE SOLDA, MOBİLDE GİZLENEBİLİR VEYA EN ALTTA */
        #alphabet-guide { 
            width: 280px; 
            height: 100%; 
            border: 2px solid #333; 
            padding: 10px; 
            background: #222; 
            border-radius: 10px; 
            overflow-y: auto;
        }

        /* GİRİŞ VE ÇIKTI BÖLGESİ */
        #input-zone { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            flex: 1;
        }
        
        #output-zone { 
            width: 300px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        /* TELGRAF BUTONU */
        #telegraph-btn {
            width: 140px; height: 140px; border-radius: 50%; background-color: #444; border: 8px solid #555;
            cursor: pointer; outline: none; transition: all 0.1s; box-shadow: 0 8px #111;
            -webkit-tap-highlight-color: transparent; /* Mobil mavi gölgeyi kaldırır */
        }
        #telegraph-btn:active { background-color: #00ff00; transform: translateY(4px); box-shadow: 0 2px #111; }

        /* YAZI ALANI */
        #result-container { flex-grow: 1; background: #000; border: 2px solid #00ff00; padding: 10px; font-size: 1.2rem; word-wrap: break-word; overflow-y: auto; border-radius: 5px; }
        #cursor { display: inline-block; width: 6px; height: 1.2rem; background-color: #00ff00; margin-left: 2px; animation: blink 1s step-end infinite; }
        @keyframes blink { from, to { background-color: transparent; } 50% { background-color: #00ff00; } }

        /* REHBER DETAYLARI */
        .guide-header { text-align: center; background: #333; margin: 5px 0; padding: 2px; font-size: 0.7rem; color: #fff; }
        .guide-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 2px 0; font-size: 0.75rem; }
        #columns-container, #numbers-container { display: flex; justify-content: space-between; gap: 8px; }
        .guide-column { flex: 1; display: flex; flex-direction: column; }
        .controls { display: flex; flex-direction: column; gap: 8px; }
        button.tool-btn { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 0.8rem; }

        /* MOBİL ÖZEL AYARLAR */
        @media (max-width: 900px) {
            #main-container { flex-direction: column; height: auto; overflow-y: visible; padding-bottom: 50px; }
            #alphabet-guide { width: 90%; order: 3; height: 300px; margin: 20px auto; }
            #input-zone { order: 1; margin-bottom: 20px; }
            #output-zone { width: 90%; order: 2; height: 200px; margin: 0 auto; }
            #telegraph-btn { width: 120px; height: 120px; }
        }
    </style>

            }
        };

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = (currentLang === 'en') ? 'tr' : 'en';
            updateUI();
            setNextWord();
        }

        function updateUI() {
            const l = data[currentLang];
            document.getElementById('task-status').innerText = l.status;
            document.getElementById('guide-title').innerText = l.guide;
            document.getElementById('header-letters').innerText = l.letters;
            document.getElementById('header-numbers').innerText = l.numbers;
            document.getElementById('btn-space').innerText = l.space;
            document.getElementById('btn-backspace').innerText = l.back;
            document.getElementById('btn-clear').innerText = l.clear;
        }

        const morseCode = {};
        function distribute(dataObj, leftColId, rightColId) {
            const keys = Object.keys(dataObj).sort();
            const mid = Math.ceil(keys.length / 2);
            keys.forEach((key, i) => {
                morseCode[dataObj[key]] = key;
                const html = `<div class="guide-item"><strong>${key}</strong> <span>${dataObj[key]}</span></div>`;
                document.getElementById(i < mid ? leftColId : rightColId).innerHTML += html;
            });
        }
        distribute(letters, 'col-left', 'col-right');
        distribute(numbers, 'num-left', 'num-right');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let oscillator;
        function startTone() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.connect(gain); gain.connect(audioCtx.destination);
            oscillator.start();
        }
        function stopTone() { if (oscillator) { oscillator.stop(); oscillator.disconnect(); } }

        let currentTarget = "";
        function setNextWord() {
            const words = data[currentLang].words;
            let picked = words[Math.floor(Math.random() * words.length)];
            currentTarget = picked.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/Ğ/g, "G").replace(/İ/g, "I").replace(/Ş/g, "S").replace(/Ç/g, "C");
            document.getElementById('target-word').innerText = currentTarget;
            document.getElementById('target-word').style.color = "#fff";
            clearAll();
        }

        function checkWin() {
            const userText = document.getElementById('result-text').innerText.replace(/\s/g, '').toUpperCase();
            if (userText === currentTarget) {
                document.getElementById('target-word').style.color = "#00ff00";
                document.getElementById('task-status').innerText = data[currentLang].win;
                setTimeout(() => {
                    document.getElementById('task-status').innerText = data[currentLang].status;
                    setNextWord();
                }, 1000);
            }
        }

        let startTime, timer, currentSequence = "";
        const btn = document.getElementById('telegraph-btn');
        const resText = document.getElementById('result-text');
        const resCont = document.getElementById('result-container');

        const handleDown = (e) => { e.preventDefault(); startTime = Date.now(); clearTimeout(timer); startTone(); };
        const handleUp = (e) => {
            e.preventDefault(); stopTone();
            let dur = Date.now() - startTime;
            currentSequence += (dur < 250) ? "." : "-";
            document.getElementById('current-signal').innerText = currentSequence;
            timer = setTimeout(decode, 650);
        };

        btn.onmousedown = handleDown; btn.onmouseup = handleUp;
        btn.ontouchstart = handleDown; btn.ontouchend = handleUp;

        function decode() {
            if (currentSequence !== "") {
                resText.innerHTML += morseCode[currentSequence] || "?";
                currentSequence = "";
                document.getElementById('current-signal').innerText = "";
                resCont.scrollTop = resCont.scrollHeight;
                checkWin();
            }
        }
        function addSpace() { decode(); resText.innerHTML += "&nbsp;"; resCont.scrollTop = resCont.scrollHeight; }
        function backspace() { 
            let c = resText.innerHTML; 
            resText.innerHTML = c.endsWith("&nbsp;") ? c.slice(0, -6) : c.slice(0, -1); 
            checkWin();
        }
        function clearAll() { resText.innerHTML = ""; currentSequence = ""; document.getElementById('current-signal').innerText = ""; }

        updateUI();
        setNextWord();
    </script>
</body>
</html>
